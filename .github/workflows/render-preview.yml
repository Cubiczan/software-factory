name: Render Preview URL

# Posts the live Render PR preview URL when the factory opens a PR with [render preview].
# Render also adds a deployment entry on the PR — this comment makes the URL easy to find.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  deployments: read

jobs:
  preview-url:
    if: contains(github.event.pull_request.title, '[render preview]')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = pr.head.sha;
            const maxAttempts = 36;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            for (let i = 0; i < maxAttempts; i++) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner,
                repo,
                sha,
                per_page: 10,
              });

              for (const dep of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: dep.id,
                  per_page: 5,
                });
                const live = statuses.find(
                  (s) => s.state === 'success' && s.environment_url,
                );
                if (live) {
                  core.setOutput('url', live.environment_url);
                  core.setOutput('environment', live.environment || 'preview');
                  return;
                }
                const pending = statuses.find((s) => s.state === 'pending' && s.environment_url);
                if (pending?.environment_url) {
                  core.setOutput('url', pending.environment_url);
                  core.setOutput('environment', pending.environment || 'preview');
                  return;
                }
              }
              core.info(`Attempt ${i + 1}/${maxAttempts} — waiting for Render deployment...`);
              await sleep(15000);
            }
            core.setFailed('Timed out waiting for Render preview deployment');

      - name: Comment preview URL on PR
        if: steps.wait.outputs.url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.wait.outputs.url }}';
            const env = '${{ steps.wait.outputs.environment }}';
            const body = [
              '## Render preview ready',
              '',
              `**Live PoC:** ${url}`,
              '',
              `Environment: \`${env}\``,
              '',
              'Built by the Software Factory. Preview is destroyed when this PR closes.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Render preview ready';
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
